<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Context Board</title>
  <style>
    :root {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --border: #30363d;
      --card-bg: #161b22;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 1.5rem; }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    input, select, button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 8px 12px;
      border-radius: 6px;
    }
    input { flex: 1; min-width: 200px; }
    button {
      cursor: pointer;
      background: var(--accent);
      color: white;
      border: none;
    }
    button:hover { opacity: 0.9; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .agent {
      font-weight: bold;
      color: var(--accent);
    }
    .timestamp {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .category {
      display: inline-block;
      padding: 2px 8px;
      background: var(--border);
      border-radius: 12px;
      font-size: 0.75rem;
      margin-bottom: 8px;
    }
    .content {
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }
    .stats {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Shared Context Board</h1>
      <div class="stats" id="stats"></div>
    </div>
    
    <div class="controls">
      <input type="text" id="search" placeholder="Search content..." oninput="render()">
      <select id="agentFilter" onchange="render()">
        <option value="">All Agents</option>
      </select>
      <select id="categoryFilter" onchange="render()">
        <option value="">All Categories</option>
      </select>
      <button onclick="loadData()">Refresh</button>
    </div>
    
    <div class="grid" id="grid"></div>
  </div>

  <script>
    let allEntries = [];
    
    async function loadData() {
      try {
        const res = await fetch('/api/contexts');
        allEntries = await res.json();
        render();
      } catch (err) {
        document.getElementById('grid').innerHTML = 
          '<div class="empty">Error loading data. Is the server running?</div>';
      }
    }
    
    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const agentFilter = document.getElementById('agentFilter').value;
      const categoryFilter = document.getElementById('categoryFilter').value;
      
      // Update filter options
      const agents = [...new Set(allEntries.map(e => e.agent))].sort();
      const agentSelect = document.getElementById('agentFilter');
      const currentAgent = agentSelect.value;
      agentSelect.innerHTML = '<option value="">All Agents</option>' +
        agents.map(a => `<option value="${a}">${a}</option>`).join('');
      agentSelect.value = currentAgent;
      
      const categories = [...new Set(allEntries.map(e => e.category))].sort();
      const catSelect = document.getElementById('categoryFilter');
      const currentCat = catSelect.value;
      catSelect.innerHTML = '<option value="">All Categories</option>' +
        categories.map(c => `<option value="${c}">${c}</option>`).join('');
      catSelect.value = currentCat;
      
      // Filter entries
      let filtered = allEntries.filter(e => {
        if (agentFilter && e.agent !== agentFilter) return false;
        if (categoryFilter && e.category !== categoryFilter) return false;
        if (search && !e.content.toLowerCase().includes(search) && 
            !e.agent.toLowerCase().includes(search)) return false;
        return true;
      });
      
      // Update stats
      document.getElementById('stats').textContent = 
        `${filtered.length} entries • ${allEntries.length} total`;
      
      // Render cards
      const grid = document.getElementById('grid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No entries match filters</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(e => `
        <div class="card">
          <div class="card-header">
            <span class="agent">${escapeHtml(e.agent)}</span>
            <span class="timestamp">${formatDate(e.timestamp)}</span>
          </div>
          <div class="category">${escapeHtml(e.category)}</div>
          <div class="content">${escapeHtml(e.content)}</div>
        </div>
      `).join('');
    }
    
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }
    
    // Initial load
    loadData();
    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
