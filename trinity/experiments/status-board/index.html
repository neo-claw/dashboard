<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Status Board</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 1rem;
  }
  h1 { margin: 0 0 1rem; font-size: 1.5rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #222;
    border-radius: 8px;
    padding: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .card h2 {
    margin: 0 0 0.5rem;
    font-size: 1rem;
    color: #aaa;
  }
  .status {
    font-size: 1.25rem;
    font-weight: 600;
  }
  .healthy { color: #4caf50; }
  .unhealthy { color: #f44336; }
  .unknown { color: #ff9800; }
  .detail {
    font-size: 0.85rem;
    color: #888;
    margin-top: 0.5rem;
  }
  .last-update {
    grid-column: 1 / -1;
    text-align: center;
    color: #666;
    font-size: 0.8rem;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<h1>🦾 OpenClaw Status Board</h1>
<div class="grid">
  <div class="card">
    <h2>Backend API</h2>
    <div class="status" id="backend-status">Checking...</div>
    <div class="detail" id="backend-detail"></div>
  </div>
  <div class="card">
    <h2>Gateway</h2>
    <div class="status" id="gateway-status">Checking...</div>
    <div class="detail" id="gateway-detail"></div>
  </div>
  <div class="card">
    <h2>Agents</h2>
    <div class="status" id="agents-status">Checking...</div>
    <div class="detail" id="agents-detail"></div>
  </div>
</div>
<div class="last-update" id="last-update"></div>

<script>
const API_BASE = window.location.origin; // assuming served from same origin

async function checkBackend() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/stats/overview`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return { healthy: true, detail: `version ${data.version || 'unknown'}` };
  } catch (e) {
    return { healthy: false, detail: e.message };
  }
}

async function checkGateway() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/gateway/status`, { cache: 'no-store' });
    if (res.status === 404) {
      // Endpoint not available; gateway status unknown
      return { healthy: null, detail: 'endpoint not available' };
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const healthy = data.status === 'running';
    return { healthy, detail: `gateway: ${data.status || 'unknown'}` };
  } catch (e) {
    return { healthy: false, detail: e.message };
  }
}

async function checkAgents() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/sessions/active`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const mainAlive = data.sessions && data.sessions.some(s => s.kind === 'main' && s.alive);
    const agentCount = (data.sessions || []).filter(s => s.kind === 'subagent' && s.alive).length;
    const healthy = mainAlive && agentCount > 0;
    return { healthy, detail: `agents: ${agentCount} alive` };
  } catch (e) {
    return { healthy: false, detail: e.message };
  }
}

function render(containerId, result) {
  const el = document.getElementById(containerId);
  const detailEl = document.getElementById(`${containerId}-detail`);
  if (result.healthy === null) {
    el.textContent = '● Unknown';
    el.className = 'status unknown';
  } else {
    el.textContent = result.healthy ? '● Healthy' : '● Unhealthy';
    el.className = 'status ' + (result.healthy ? 'healthy' : 'unhealthy');
  }
  detailEl.textContent = result.detail;
}

async function runChecks() {
  const [backend, gateway, agents] = await Promise.all([
    checkBackend(),
    checkGateway(),
    checkAgents()
  ]);
  render('backend-status', backend);
  render('gateway-status', gateway);
  render('agents-status', agents);
  document.getElementById('last-update').textContent = `Updated: ${new Date().toISOString()}`;
}

// Initial run and then every 30 seconds
runChecks();
setInterval(runChecks, 30000);
</script>
</body>
</html>
